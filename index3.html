<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡师傅 - 在线点餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; }
        .card { transition: all 0.3s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        img { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-4">
    <div class="bg-red-600 text-white text-center py-8 rounded-2xl mb-8">
        <h1 class="text-5xl font-bold">🍜 蔡师傅</h1>
        <p class="text-2xl mt-2">在线点餐系统 - 20道经典菜品（每道 ¥10）</p>
        <p class="text-sm mt-1 opacity-80">☁️ 订单实时同步云端</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="menu-grid"></div>

    <!-- 购物车 -->
    <div class="fixed bottom-6 right-6 bg-white shadow-2xl rounded-3xl p-6 w-96 max-h-[80vh] overflow-y-auto border-4 border-red-500" id="cart-panel">
        <h2 class="text-3xl font-bold text-red-600 flex items-center gap-2">
            🛒 你的购物车 <span id="cart-count" class="bg-red-500 text-white text-sm px-3 py-1 rounded-full">0</span>
        </h2>
        <div id="cart-items" class="my-4 space-y-4"></div>
        <div class="border-t pt-4">
            <p class="text-2xl font-bold">总计：¥ <span id="total-price" class="text-red-600">0</span></p>
        </div>
        <button onclick="window.submitOrder()" class="w-full bg-red-600 hover:bg-red-700 text-white text-2xl font-bold py-4 rounded-2xl mt-6 transition">
            ✅ 提交订单
        </button>
    </div>
</div>

<!-- 支付弹窗 -->
<div id="payment-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4 text-center">
        <h2 class="text-3xl font-bold mb-4">💳 确认支付</h2>
        <p class="text-xl mb-2">订单号：<span id="modal-order-num" class="font-mono font-bold text-red-600"></span></p>
        <p class="text-5xl font-bold text-red-600 my-6">¥ <span id="modal-total"></span></p>
        <button onclick="window.completePayment()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl text-2xl font-bold mb-4">✅ 模拟支付完成</button>
        <button onclick="window.closePaymentModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 py-4 rounded-2xl text-2xl font-bold">取消</button>
    </div>
</div>

<!-- 成功弹窗 -->
<div id="success-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4 text-center">
        <div class="text-7xl mb-6">🎉</div>
        <h2 class="text-3xl font-bold mb-2">订单提交成功！</h2>
        <p class="text-xl mb-6">订单号：<span id="order-number" class="font-mono font-bold text-red-600"></span></p>
        <p class="text-gray-600 mb-8">厨房已收到，我们马上为您准备～</p>
        <button onclick="window.finishOrder()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl text-2xl font-bold">关闭并继续点餐</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, serverTimestamp } from "firebase/database";

    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyC9IsHbiJyEc97-sVMVN0iOda7m8Icb0Eo",
        authDomain: "caishifuoder-9ee58.firebaseapp.com",
        projectId: "caishifuoder-9ee58",
        storageBucket: "caishifuoder-9ee58.firebasestorage.app",
        messagingSenderId: "933419899359",
        appId: "1:933419899359:web:4954542e0141191fc44c6a",
        measurementId: "G-EZMND60HK7"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ==================== 菜品数据（使用您原文件中的图片链接）====================
    const dishes = [
        {id:1, name:"现煮膏蟹大虾火锅", price:10, img:"https://iili.io/qrlSPs4.md.jpg", desc:"秘制汤底现煮，膏蟹+巨虾咕嘟咕嘟沸腾上桌，超鲜超香！"},
        {id:2, name:"广西正宗螺蛳粉", price:10, img:"https://iili.io/qUBgoxI.jpg", desc:"又臭又香，配上炸蛋烧肉无敌"},
        {id:3, name:"南宁果酱烧烤", price:10, img:"https://iili.io/qUjAp3l.jpg", desc:"因制作不易价格略高"},
        {id:4, name:"番茄炒蛋", price:10, img:"https://iili.io/qUw4wxV.jpg", desc:"酸甜开胃，让你打开食欲"},
        {id:5, name:"Nasi Lemak 椰浆饭", price:10, img:"https://iili.io/qUN6dMB.jpg", desc:"香味四溢，解你思马来西亚之情"},
        {id:6, name:"咖喱米粉", price:10, img:"https://iili.io/qUeFP07.jpg", desc:"浓郁咖喱汤底，让你一吃爱上"},
        {id:7, name:"酥炸鱿鱼", price:10, img:"https://iili.io/qUexw9S.jpg", desc:"鲜嫩鱿鱼炸至金脆"},
        {id:8, name:"芝士汉堡", price:10, img:"https://iili.io/qUec14t.jpg", desc:"手工制作，与图片略有差异"},
        {id:9, name:"火鸡面+韩式炸鸡", price:10, img:"https://iili.io/qUewKyN.jpg", desc:"酥脆炸鸡淋甜辣酱 +拉丝芝士超满足"},
        {id:10, name:"部队锅", price:10, img:"https://iili.io/qUeDjne.jpg", desc:"韩式泡面"},
        {id:11, name:"麻辣香锅", price:10, img:"https://iili.io/qUSQPcb.jpg", desc:"自选宽粉/米线 + 肉片 + 炸豆皮 + 鸡蛋 + 青菜 + 花生"},
        {id:12, name:"顺德干蒸菜", price:10, img:"https://iili.io/qUUa4UB.jpg", desc:"嫩滑猪五花肉/牛肉片"},
        {id:13, name:"马来西亚肉骨茶", price:10, img:"https://iili.io/qUUZ2p4.jpg", desc:"搭配油条更香"},
        {id:14, name:"辣椒板面", price:10, img:"https://iili.io/qUglwWg.jpg", desc:"粗面条 + 浓郁肉末酱 + 荷包蛋 + 小鱼干 + 辣椒碎"},
        {id:15, name:"黯然销魂蛋炒饭", price:10, img:"https://iili.io/qUrKuVe.jpg", desc:"粒粒分明 + 火腿/腊肠碎 + 胡萝卜丁 + 葱花 + 嫩蛋花"},
        {id:16, name:"南宁老友粉", price:10, img:"https://iili.io/qUrkcMv.jpg", desc:"南宁经典，妈妈的味道"},
        {id:17, name:"砂锅红烧肉", price:10, img:"https://iili.io/qU435oF.jpg", desc:"肥而不腻入口即化"},
        {id:18, name:"黑椒牛肉意面 + 肉丸汤", price:10, img:"https://iili.io/qUtpZ7a.jpg", desc:"浓郁黑椒牛肉意大利面 + 清汤肉丸萝卜汤"},
        {id:19, name:"芝士鸡肉三明治", price:10, img:"https://iili.io/qUZ5mXV.jpg", desc:"新鲜制作，美味可口开启新一天"},
        {id:20, name:"海鲜大拼盘 Seafood Platter (蟹+虾)", price:10, img:"https://iili.io/qUD466x.jpg", desc:"新鲜大海鲜"}
    ];

    let cart = [];
    let currentOrder = null;

    // 渲染菜单
    function renderMenu() {
        const grid = document.getElementById('menu-grid');
        if (!grid) return;
        grid.innerHTML = '';
        dishes.forEach(dish => {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-3xl overflow-hidden card shadow-lg';
            card.innerHTML = `
                <img src="${dish.img}" class="w-full h-56 object-cover" onerror="this.src='https://placehold.co/400x300/EF4444/white?text=${encodeURIComponent(dish.name)}'">
                <div class="p-5">
                    <h3 class="text-2xl font-bold">${dish.name}</h3>
                    <p class="text-gray-600 text-sm my-2">${dish.desc}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-3xl font-bold text-red-600">¥${dish.price}</span>
                        <button onclick="addToCart(${dish.id})" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-2xl text-xl font-bold">+ 加一份</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 购物车操作 (挂载到 window 以便 onclick 调用)
    window.addToCart = function(id) {
        const dish = dishes.find(d => d.id === id);
        const existing = cart.find(item => item.id === id);
        if (existing) existing.qty += 1;
        else cart.push({...dish, qty: 1});
        renderCart();
    };

    window.changeQty = function(id, change) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.qty += change;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
        }
        renderCart();
    };

    window.removeFromCart = function(id) {
        cart = cart.filter(item => item.id !== id);
        renderCart();
    };

    function renderCart() {
        const container = document.getElementById('cart-items');
        if (!container) return;
        container.innerHTML = '';
        let total = 0;
        let totalQty = 0;

        cart.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flex gap-4 items-center bg-gray-50 p-4 rounded-2xl';
            div.innerHTML = `
                <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl" onerror="this.src='https://placehold.co/100x100/EF4444/white?text=菜'">
                <div class="flex-1">
                    <div class="font-bold">${item.name}</div>
                    <div class="text-red-600">¥${item.price} × ${item.qty}</div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="changeQty(${item.id}, -1)" class="w-8 h-8 bg-gray-200 hover:bg-gray-300 rounded-xl">-</button>
                    <span class="w-8 text-center font-bold">${item.qty}</span>
                    <button onclick="changeQty(${item.id}, 1)" class="w-8 h-8 bg-gray-200 hover:bg-gray-300 rounded-xl">+</button>
                </div>
                <button onclick="removeFromCart(${item.id})" class="text-red-500 text-xl">×</button>
            `;
            container.appendChild(div);
            total += item.price * item.qty;
            totalQty += item.qty;
        });

        document.getElementById('total-price').textContent = total;
        document.getElementById('cart-count').textContent = totalQty;
    }

    // 保存到 localStorage (备份)
    function saveOrderToLocal(order) {
        let orders = JSON.parse(localStorage.getItem('caishifu_orders')) || [];
        orders.unshift(order);
        if (orders.length > 50) orders.pop();
        localStorage.setItem('caishifu_orders', JSON.stringify(orders));
    }

    // 提交订单
    window.submitOrder = function() {
        if (cart.length === 0) {
            alert("购物车是空的哦～先加几道菜吧！");
            return;
        }

        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        const orderNum = "SF" + Date.now().toString().slice(-8);

        currentOrder = {
            orderNum: orderNum,
            time: new Date().toLocaleString('zh-CN'),
            items: cart.map(item => ({ name: item.name, price: item.price, qty: item.qty })),
            total: total,
            status: "pending",
            timestamp: Date.now()
        };

        saveOrderToLocal(currentOrder);

        document.getElementById('modal-total').textContent = total;
        document.getElementById('modal-order-num').textContent = orderNum;
        document.getElementById('payment-modal').classList.remove('hidden');
    };

    window.closePaymentModal = function() {
        document.getElementById('payment-modal').classList.add('hidden');
    };

    // 上传到 Firebase 并完成支付
    window.completePayment = async function() {
        if (!currentOrder) return;

        const payBtn = document.querySelector('#payment-modal button:first-of-type');
        if (payBtn) {
            payBtn.innerHTML = '⏳ 提交中...';
            payBtn.disabled = true;
        }

        try {
            // 上传到 Firebase Realtime Database
            const ordersRef = ref(db, 'orders');
            await push(ordersRef, {
                ...currentOrder,
                timestamp: serverTimestamp()
            });
            
            console.log("✅ 订单已上传至 Firebase");
            closePaymentModal();
            document.getElementById('order-number').textContent = currentOrder.orderNum;
            document.getElementById('success-modal').classList.remove('hidden');
        } catch (err) {
            console.error("Firebase上传失败:", err);
            closePaymentModal();
            document.getElementById('order-number').textContent = currentOrder.orderNum;
            document.getElementById('success-modal').classList.remove('hidden');
            alert("⚠️ 云端连接稍慢，订单已保存到本地，厨房仍可正常接收！");
        } finally {
            if (payBtn) {
                payBtn.innerHTML = '✅ 模拟支付完成';
                payBtn.disabled = false;
            }
        }
    };

    window.finishOrder = function() {
        document.getElementById('success-modal').classList.add('hidden');
        cart = [];
        currentOrder = null;
        renderCart();
        alert("🎉 感谢您的订单！我们马上为您准备～");
    };

    // 初始化
    renderMenu();
    renderCart();
</script>
</body>
</html>
