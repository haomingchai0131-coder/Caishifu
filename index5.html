<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蔡师傅 - 在线点餐</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: "Microsoft YaHei", sans-serif; }

/* 卡片动画 */
.card { transition: all 0.25s ease; }
.card:hover { transform: translateY(-4px); }

/* 渐变按钮 */
.btn-main {
    background: linear-gradient(135deg,#ff4d4f,#ff7875);
}

/* 页面切换动画 */
.fade { animation: fadeIn .3s ease; }
@keyframes fadeIn {
    from {opacity:0; transform:scale(0.95);}
    to {opacity:1;}
}
</style>
</head>

<body class="bg-gray-100">

<!-- 主页面 -->
<div id="main-page" class="fade">

<div class="max-w-6xl mx-auto p-4">

<div class="bg-red-500 text-white text-center py-6 rounded-3xl mb-6 shadow-lg">
<h1 class="text-4xl font-bold">🍜 蔡师傅</h1>
<p class="opacity-90">在线点餐</p>
</div>

<div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<!-- 购物车 -->
<div class="fixed bottom-5 right-5 bg-white p-5 rounded-3xl shadow-2xl w-80">

<h2 class="text-xl font-bold text-red-500 mb-2">🛒 购物车 (<span id="cart-count">0</span>)</h2>

<div id="cart-items" class="text-sm space-y-1 mb-2"></div>

<div class="flex justify-between font-bold text-lg">
<span>总计</span>
<span class="text-red-500">¥ <span id="total-price">0</span></span>
</div>

<button id="submit-btn" onclick="submitOrder()"
class="btn-main w-full text-white py-3 rounded-2xl mt-3 text-lg font-bold">
提交订单
</button>

</div>

</div>

<!-- ✅ 下单成功页面 -->
<div id="success-page" class="hidden fixed inset-0 bg-white flex flex-col items-center justify-center text-center fade">

<div class="text-7xl mb-6">🎉</div>

<h2 class="text-3xl font-bold mb-3">下单成功！</h2>

<p class="text-gray-500 mb-6">订单号</p>
<p id="order-number" class="text-2xl font-mono text-red-500 mb-8"></p>

<button onclick="backToHome()"
class="btn-main text-white px-8 py-4 rounded-2xl text-lg font-bold">
继续点餐
</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC9IsHbiJyEc97-sVMVN0iOda7m8Icb0Eo",
authDomain: "caishifuoder-9ee58.firebaseapp.com",
projectId: "caishifuoder-9ee58"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 菜单 */
const dishes = [
{id:1,name:"现煮膏蟹大虾火锅",price:10,img:"https://iili.io/qrlSPs4.md.jpg"},
{id:2,name:"螺蛳粉",price:10,img:"https://iili.io/qUBgoxI.jpg"},
{id:3,name:"番茄炒蛋",price:10,img:"https://iili.io/qUw4wxV.jpg"},
{id:4,name:"麻辣香锅",price:10,img:"https://iili.io/qUSQPcb.jpg"},
{id:5,name:"芝士汉堡",price:10,img:"https://iili.io/qUec14t.jpg"},
{id:6,name:"火鸡面+炸鸡",price:10,img:"https://iili.io/qUewKyN.jpg"}
];

let cart=[];

/* 渲染菜单 */
function renderMenu(){
const grid=document.getElementById("menu-grid");
grid.innerHTML="";
dishes.forEach(d=>{
grid.innerHTML+=`
<div class="bg-white rounded-3xl shadow-lg p-4 card">
<img src="${d.img}" class="h-40 w-full object-cover rounded-2xl">
<h3 class="font-bold mt-2">${d.name}</h3>
<p class="text-red-500 font-bold">¥${d.price}</p>
<button onclick="addToCart(${d.id})"
class="btn-main text-white px-4 py-2 mt-2 rounded-xl">+ 加一份</button>
</div>`;
});
}

/* 购物车 */
window.addToCart=function(id){
const item=dishes.find(d=>d.id===id);
const exist=cart.find(i=>i.id===id);
if(exist) exist.qty++;
else cart.push({...item,qty:1});
renderCart();
};

function renderCart(){
let total=0,count=0;
const box=document.getElementById("cart-items");
box.innerHTML="";
cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;
box.innerHTML+=`<div>${i.name} x ${i.qty}</div>`;
});
document.getElementById("total-price").innerText=total;
document.getElementById("cart-count").innerText=count;
}

/* 下单 */
window.submitOrder=async function(){
if(cart.length===0){alert("先点餐");return;}

const btn=document.getElementById("submit-btn");
btn.innerText="下单中...";
btn.disabled=true;

const orderNum="SF"+Date.now();

try{
push(ref(db,"orders"),{
orderNum,
items:cart,
total:cart.reduce((s,i)=>s+i.price*i.qty,0),
timestamp:serverTimestamp()
});
}catch(e){}

/* 切页面 */
document.getElementById("order-number").innerText=orderNum;
document.getElementById("main-page").classList.add("hidden");
document.getElementById("success-page").classList.remove("hidden");

/* 清空 */
cart=[];
renderCart();

btn.innerText="提交订单";
btn.disabled=false;
};

/* 返回 */
window.backToHome=function(){
document.getElementById("success-page").classList.add("hidden");
document.getElementById("main-page").classList.remove("hidden");
};

renderMenu();
renderCart();

</script>

</body>
</html>
