<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡师傅 - 在线点餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; }
        .card { transition: all 0.3s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-4">
    <div class="bg-red-600 text-white text-center py-8 rounded-2xl mb-8">
        <h1 class="text-5xl font-bold">🍜 蔡师傅</h1>
        <p class="text-2xl mt-2">在线点餐系统 - 20道经典菜品（每道 ¥10）</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="menu-grid"></div>

    <!-- 购物车 -->
    <div class="fixed bottom-6 right-6 bg-white shadow-2xl rounded-3xl p-6 w-96 max-h-[80vh] overflow-y-auto border-4 border-red-500" id="cart-panel">
        <h2 class="text-3xl font-bold text-red-600 flex items-center gap-2">
            🛒 你的购物车 <span id="cart-count" class="bg-red-500 text-white text-sm px-3 py-1 rounded-full">0</span>
        </h2>
        <div id="cart-items" class="my-4 space-y-4"></div>
        <div class="border-t pt-4">
            <p class="text-2xl font-bold">总计：¥ <span id="total-price" class="text-red-600">0</span></p>
        </div>
        <button onclick="submitOrder()" class="w-full bg-red-600 hover:bg-red-700 text-white text-2xl font-bold py-4 rounded-2xl mt-6 transition">
            ✅ 提交订单
        </button>
    </div>
</div>

<script>
// ==================== 菜品数据 ====================
const dishes = [
    {id:1, name:"现煮膏蟹大虾火锅", price:10, img:"https://iili.io/qrlSPs4.md.jpg", desc:"秘制汤底现煮，膏蟹+巨虾咕嘟咕嘟沸腾上桌，超鲜超香！"},
    {id:2, name:"广西正宗螺蛳粉", price:10, img:"https://iili.io/qUBgoxI.jpg", desc:"又臭又香，配上炸蛋烧肉无敌"},
    {id:3, name:"南宁果酱烧烤", price:10, img:"https://iili.io/qUjAp3l.jpg", desc:"因制作不易价格略高"},
    {id:4, name:"番茄炒蛋", price:10, img:"https://iili.io/qUw4wxV.jpg", desc:"酸甜开胃，让你打开食欲"},
    {id:5, name:"Nasi Lemak 椰浆饭", price:10, img:"https://iili.io/qUN6dMB.jpg", desc:"香味四溢，解你思马来西亚之情"},
    {id:6, name:"咖喱米粉", price:10, img:"https://iili.io/qUeFP07.jpg", desc:"浓郁咖喱汤底，让你一吃爱上"},
    {id:7, name:"酥炸鱿鱼", price:10, img:"https://iili.io/qUexw9S.jpg", desc:"鲜嫩鱿鱼炸至金脆"},
    {id:8, name:"芝士汉堡", price:10, img:"https://iili.io/qUec14t.jpg", desc:"手工制作，与图片略有差异"},
    {id:9, name:"火鸡面+韩式炸鸡", price:10, img:"https://iili.io/qUewKyN.jpg", desc:"酥脆炸鸡淋甜辣酱 +拉丝芝士超满足"},
    {id:10, name:"部队锅", price:10, img:"https://iili.io/qUeDjne.jpg", desc:"韩式泡面"},
    {id:11, name:"麻辣香锅", price:10, img:"https://iili.io/qUSQPcb.jpg", desc:"自选宽粉/米线 + 肉片 + 炸豆皮 + 鸡蛋 + 青菜 + 花生"},
    {id:12, name:"顺德干蒸菜", price:10, img:"https://iili.io/qUUa4UB.jpg", desc:"嫩滑猪五花肉/牛肉片"},
    {id:13, name:"马来西亚肉骨茶", price:10, img:"https://iili.io/qUUZ2p4.jpg", desc:"搭配油条更香"},
    {id:14, name:"辣椒板面", price:10, img:"https://iili.io/qUglwWg.jpg", desc:"粗面条 + 浓郁肉末酱 + 荷包蛋 + 小鱼干 + 辣椒碎"},
    {id:15, name:"黯然销魂蛋炒饭", price:10, img:"https://iili.io/qUrKuVe.jpg", desc:"粒粒分明 + 火腿/腊肠碎 + 胡萝卜丁 + 葱花 + 嫩蛋花"},
    {id:16, name:"南宁老友粉", price:10, img:"https://iili.io/qUrkcMv.jpg", desc:"南宁经典，妈妈的味道"},
    {id:17, name:"砂锅红烧肉", price:10, img:"https://iili.io/qU435oF.jpg", desc:"肥而不腻入口即化"},
    {id:18, name:"黑椒牛肉意面 + 肉丸汤", price:10, img:"https://iili.io/qUtpZ7a.jpg", desc:"浓郁黑椒牛肉意大利面 + 清汤肉丸萝卜汤"},
    {id:19, name:"芝士鸡肉三明治", price:10, img:"https://iili.io/qUZ5mXV.jpg", desc:"新鲜制作，美味可口开启新一天"},
    {id:20, name:"海鲜大拼盘 Seafood Platter (蟹+虾)", price:10, img:"https://iili.io/qUD466x.jpg", desc:"新鲜大海鲜"}
];

let cart = [];
let currentOrder = null;

// ==================== 渲染菜单 ====================
function renderMenu() {
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = '';
    dishes.forEach(dish => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-3xl overflow-hidden card shadow-lg';
        card.innerHTML = `
            <img src="${dish.img}" class="w-full h-56 object-cover">
            <div class="p-5">
                <h3 class="text-2xl font-bold">${dish.name}</h3>
                <p class="text-gray-600 text-sm my-2">${dish.desc}</p>
                <div class="flex justify-between items-center">
                    <span class="text-3xl font-bold text-red-600">¥${dish.price}</span>
                    <button onclick="addToCart(${dish.id})" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-2xl text-xl font-bold">+ 加一份</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

// ==================== 购物车函数 ====================
function addToCart(id) {
    const dish = dishes.find(d => d.id === id);
    const existing = cart.find(item => item.id === id);
    if (existing) existing.qty += 1; else cart.push({...dish, qty: 1});
    renderCart();
}
function changeQty(id, change) {
    const item = cart.find(i => i.id === id);
    if (item) { item.qty += change; if (item.qty <= 0) cart = cart.filter(i => i.id !== id); }
    renderCart();
}
function removeFromCart(id) {
    cart = cart.filter(item => item.id !== id);
    renderCart();
}
function renderCart() {
    const container = document.getElementById('cart-items');
    container.innerHTML = '';
    let total = 0;
    cart.forEach(item => {
        const div = document.createElement('div');
        div.className = 'flex gap-4 items-center bg-gray-50 p-4 rounded-2xl';
        div.innerHTML = `
            <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl">
            <div class="flex-1">
                <div class="font-bold">${item.name}</div>
                <div class="text-red-600">¥${item.price} × ${item.qty}</div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="changeQty(${item.id}, -1)" class="w-8 h-8 bg-gray-200 hover:bg-gray-300 rounded-xl">-</button>
                <span class="w-8 text-center font-bold">${item.qty}</span>
                <button onclick="changeQty(${item.id}, 1)" class="w-8 h-8 bg-gray-200 hover:bg-gray-300 rounded-xl">+</button>
            </div>
            <button onclick="removeFromCart(${item.id})" class="text-red-500 text-xl">×</button>
        `;
        container.appendChild(div);
        total += item.price * item.qty;
    });
    document.getElementById('total-price').textContent = total;
    document.getElementById('cart-count').textContent = cart.length;
}

// ==================== 新增：保存到 localStorage（厨房后台实时接收） ====================
function saveOrderToLocal(order) {
    let orders = JSON.parse(localStorage.getItem('caishifu_orders')) || [];
    orders.unshift(order);
    if (orders.length > 50) orders.pop();
    localStorage.setItem('caishifu_orders', JSON.stringify(orders));
}

// ==================== 发送订单（webhook 备用） ====================
async function sendOrderToWebhook(order) {
    const webhookUrl = "https://webhook.site/1bc209a4-63f6-4747-912a-74647a1a9d70";
    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(webhookUrl);

    const payload = {
        orderNum: order.orderNum,
        total: order.total,
        time: new Date().toLocaleString('zh-CN'),
        items: order.items.map(item => ({
            name: item.name,
            qty: item.qty,
            price: item.price,
            subtotal: item.price * item.qty
        }))
    };

    try {
        const res = await fetch(proxyUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (res.ok) console.log("✅ 已推送到 webhook.site");
    } catch (err) {
        console.error("webhook推送失败", err);
    }
}

// ==================== 提交订单（已删除支付宝，直接提交） ====================
function submitOrder() {
    if (cart.length === 0) { 
        alert("购物车是空的哦～先加几道菜吧！"); 
        return; 
    }

    const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    const orderNum = "KL" + Math.floor(100000 + Math.random() * 900000);
    
    currentOrder = {
        orderNum: orderNum,
        time: new Date().toLocaleString('zh-CN'),
        items: JSON.parse(JSON.stringify(cart)),
        total: total,
        status: "pending"
    };

    // 🔥 直接保存到本地 + webhook
    saveOrderToLocal(currentOrder);
    sendOrderToWebhook(currentOrder);

    // 显示成功弹窗
    document.getElementById('order-number').textContent = currentOrder.orderNum;
    document.getElementById('success-modal').classList.remove('hidden');
}

function finishOrder() {
    document.getElementById('success-modal').classList.add('hidden');
    cart = [];
    currentOrder = null;
    renderCart();
    alert("🎉 感谢您的订单！我们马上为您准备～");
}

// 初始化
renderMenu();
</script>

<!-- 成功弹窗（已修改文案） -->
<div id="success-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60]">
    <div class="bg-white w-full max-w-md mx-4 rounded-3xl p-8 text-center">
        <div class="text-6xl mb-6">🎉</div>
        <h2 class="text-4xl font-bold text-green-600">订单提交成功！</h2>
        <p class="text-2xl mt-4">订单号：<span id="order-number" class="font-mono bg-gray-100 px-3 py-1 rounded"></span></p>
        <p class="text-xl mt-8 text-gray-600">订单已正式提交！<br>我们马上为您准备～</p>
        <button onclick="finishOrder()" class="mt-10 w-full bg-green-600 text-white text-2xl font-bold py-5 rounded-3xl">返回菜单</button> 
    </div>
</div>

</body>
</html>
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡师傅 - 厨房后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; }
        .order-card { transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">

<div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold flex items-center gap-3">👨‍🍳 蔡师傅厨房后台</h1>
        <div class="flex items-center gap-4">
            <span id="last-update" class="text-sm text-gray-400"></span>
            <button onclick="loadOrders()" 
                    class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-2xl font-bold flex items-center gap-2">
                🔄 手动刷新
            </button>
        </div>
    </div>

    <div id="orders-list" class="space-y-6"></div>
</div>

<script>
let orders = [];

function loadOrders() {
    orders = JSON.parse(localStorage.getItem('caishifu_orders')) || [];
    const container = document.getElementById('orders-list');
    container.innerHTML = '';

    if (orders.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-gray-400 text-2xl">暂无新订单～</div>`;
        return;
    }

    orders.forEach((order, index) => {
        const div = document.createElement('div');
        div.className = `order-card bg-white text-gray-900 rounded-3xl p-6 shadow-xl ${order.status === 'completed' ? 'opacity-75' : ''}`;
        div.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="font-mono text-3xl font-bold text-red-600">${order.orderNum}</span>
                    <span class="ml-4 text-sm text-gray-500">${order.time}</span>
                </div>
                <span class="px-4 py-1 rounded-full text-sm font-bold ${order.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                    ${order.status === 'completed' ? '✅ 已完成' : '⏳ 待接单'}
                </span>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                ${order.items.map(item => `
                    <div class="flex justify-between text-lg">
                        <span>${item.name}</span>
                        <span class="font-bold">× ${item.qty}</span>
                    </div>
                `).join('')}
            </div>

            <div class="flex
						justify-between items-center text-2xl font-bold border-t pt-4">
                <span>总计：¥ <span class="text-red-600">${order.total}</span></span>
                ${order.status !== 'completed' ? 
                    `<button onclick="completeOrder(${index})" class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl text-xl">
                        ✅ 接单完成
                    </button>` : ''}
            </div>
        `;
        container.appendChild(div);
    });

    document.getElementById('last-update').textContent = `最后更新：${new Date().toLocaleTimeString('zh-CN')}`;
}

// 标记订单为已完成
function completeOrder(index) {
    orders[index].status = 'completed';
    localStorage.setItem('caishifu_orders', JSON.stringify(orders));
    loadOrders();
    alert(`订单 ${orders[index].orderNum} 已标记为完成！`);
}

// 每3秒自动刷新
setInterval(loadOrders, 3000);

// 初始化加载
loadOrders();
</script>
</body>
</html>
