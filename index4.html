<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡师傅 - 厨房后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; }
        .order-card { transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">

<div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-8 flex items-center justify-center gap-3">
        👨‍🍳 蔡师傅厨房后台
    </h1>
    <div id="orders-list" class="space-y-6"></div>
</div>

<!-- 声音提示 -->
<audio id="newOrderSound" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// Firebase 初始化
const firebaseConfig = {
  apiKey: "AIzaSyC9IsHbiJyEc97-sVMVN0iOda7m8Icb0Eo",
  authDomain: "caishifuoder-9ee58.firebaseapp.com",
  projectId: "caishifuoder-9ee58",
  storageBucket: "caishifuoder-9ee58.firebasestorage.app",
  messagingSenderId: "933419899359",
  appId: "1:933419899359:web:4954542e0141191fc44c6a",
  measurementId: "G-EZMND60HK7"
};
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 实时监听订单
const ordersRef = db.ref('orders');
ordersRef.on('value', (snapshot) => {
    const container = document.getElementById('orders-list');
    container.innerHTML = '';

    const data = snapshot.val();
    if (!data) {
        container.innerHTML = `<div class="text-center py-20 text-gray-400 text-2xl">暂无新订单～<br>等待顾客下单</div>`;
        return;
    }

    let hasNew = false;
    Object.keys(data).forEach(key => {
        const order = data[key];
        if (order.status === "pending") hasNew = true;

        const div = document.createElement('div');
        div.className = 'order-card bg-white text-gray-900 rounded-3xl p-6 shadow-xl';
        div.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="font-mono text-3xl font-bold text-red-600">${order.orderNum}</span>
                    <span class="ml-4 text-sm text-gray-500">${order.time}</span>
                </div>
                <span class="px-4 py-1 rounded-full text-sm font-bold bg-red-100 text-red-700">待接单</span>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                ${order.items.map(item => `<div class="flex justify-between text-lg"><span>${item.name}</span><span class="font-bold">× ${item.qty}</span></div>`).join('')}
            </div>
            <div class="flex justify-between items-center text-2xl font-bold border-t pt-4">
                <span>总计：¥ <span class="text-red-600">${order.total}</span></span>
                <button onclick="completeOrder('${key}')" class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl text-xl">✅ 接单完成</button>
            </div>
        `;
        container.appendChild(div);
    });

    if (hasNew) document.getElementById('newOrderSound').play();
});

window.completeOrder = function(key) {
    db.ref('orders/' + key).update({ status: "completed" });
};
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</body>
</html>
