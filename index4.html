<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡师傅 - 厨房后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .order-card { transition: all 0.3s; }
        .order-card:hover { transform: translateY(-4px); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .new-order { animation: pulse 0.6s ease-out 2; border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="min-h-screen p-6">

<div class="max-w-5xl mx-auto">
    <div class="flex flex-wrap justify-between items-center gap-4 mb-8 bg-gray-800/50 rounded-2xl p-5 backdrop-blur">
        <h1 class="text-3xl md:text-4xl font-bold flex items-center gap-3 text-white">
            👨‍🍳 蔡师傅厨房后台
            <span class="text-sm bg-green-600 px-3 py-1 rounded-full">☁️ 实时同步</span>
        </h1>
        <div class="flex items-center gap-4">
            <span id="online-status" class="text-sm text-green-400 flex items-center gap-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> 连接中...
            </span>
            <button onclick="window.loadFromFirebase?.()" 
                    class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition">
                🔄 手动刷新
            </button>
        </div>
    </div>

    <div id="orders-list" class="space-y-6"></div>
</div>

<!-- 声音提示 -->
<audio id="newOrderSound">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, onValue, update, serverTimestamp } from "firebase/database";

    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyC9IsHbiJyEc97-sVMVN0iOda7m8Icb0Eo",
        authDomain: "caishifuoder-9ee58.firebaseapp.com",
        projectId: "caishifuoder-9ee58",
        storageBucket: "caishifuoder-9ee58.firebasestorage.app",
        messagingSenderId: "933419899359",
        appId: "1:933419899359:web:4954542e0141191fc44c6a",
        measurementId: "G-EZMND60HK7"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ordersRef = ref(db, 'orders');

    let previousOrderKeys = new Set();

    function playSound() {
        const audio = document.getElementById('newOrderSound');
        if (audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("自动播放需要用户交互"));
        }
        if (navigator.vibrate) navigator.vibrate(200);
    }

    // 请求通知权限
    if (Notification.permission === "default") {
        Notification.requestPermission();
    }

    function showNotification(orderNum) {
        if (Notification.permission === "granted") {
            new Notification("🍜 蔡师傅厨房", {
                body: `新订单 ${orderNum} 已到达！`,
                icon: "https://iili.io/qrlSPs4.md.jpg"
            });
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 渲染订单列表
    function renderOrders(data) {
        const container = document.getElementById('orders-list');
        
        if (!data) {
            container.innerHTML = `<div class="text-center py-20 text-gray-400 text-2xl bg-gray-800/30 rounded-3xl">
                📭 暂无订单，等待顾客点餐～
            </div>`;
            previousOrderKeys.clear();
            return;
        }
        
        const entries = Object.entries(data);
        const activeEntries = entries.filter(([key, order]) => order.status !== 'completed');
        
        if (activeEntries.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-gray-400 text-2xl bg-gray-800/30 rounded-3xl">
                ✅ 所有订单已完成！休息一下～
            </div>`;
            previousOrderKeys.clear();
            return;
        }
        
        // 检测新订单
        const currentKeys = new Set(activeEntries.map(([key]) => key));
        let hasNew = false;
        let newOrderNum = null;
        
        for (let key of currentKeys) {
            if (!previousOrderKeys.has(key)) {
                hasNew = true;
                const order = data[key];
                newOrderNum = order.orderNum;
                break;
            }
        }
        
        if (hasNew && previousOrderKeys.size > 0) {
            playSound();
            if (newOrderNum) showNotification(newOrderNum);
        }
        previousOrderKeys = currentKeys;
        
        // 按时间倒序排序
        activeEntries.sort((a, b) => {
            const timeA = a[1].timestamp || 0;
            const timeB = b[1].timestamp || 0;
            return timeB - timeA;
        });
        
        container.innerHTML = '';
        
        for (const [key, order] of activeEntries) {
            const isNew = hasNew && !previousOrderKeys.has(key);
            const div = document.createElement('div');
            div.className = `order-card bg-white text-gray-900 rounded-2xl p-6 shadow-xl ${isNew ? 'new-order' : ''}`;
            
            const itemsHtml = (order.items || []).map(item => `
                <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0">
                    <span class="font-medium">${escapeHtml(item.name)}</span>
                    <span class="font-bold text-red-600">× ${item.qty}</span>
                </div>
            `).join('');
            
            const displayTime = order.timestamp ? new Date(order.timestamp).toLocaleString('zh-CN') : order.time;
            
            div.innerHTML = `
                <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
                    <div>
                        <span class="font-mono text-2xl md:text-3xl font-bold text-red-600">${escapeHtml(order.orderNum)}</span>
                        <span class="ml-3 text-sm text-gray-500">${displayTime || '刚刚'}</span>
                    </div>
                    <span class="px-3 py-1 rounded-full text-sm font-bold bg-red-100 text-red-700 flex items-center gap-1">
                        ⏳ 待接单
                    </span>
                </div>
                <div class="bg-gray-50 rounded-xl p-4 mb-5">
                    <div class="font-semibold text-gray-700 mb-2">📋 菜品明细</div>
                    <div class="space-y-1">${itemsHtml || '<div class="text-gray-400">暂无明细</div>'}</div>
                </div>
                <div class="flex justify-between items-center text-xl font-bold border-t pt-4">
                    <span>总计：¥ <span class="text-3xl text-red-600">${order.total || 0}</span></span>
                    <button onclick="window.completeOrder('${key}')" 
                            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl text-lg font-bold flex items-center gap-2 transition">
                        ✅ 接单完成
                    </button>
                </div>
            `;
            container.appendChild(div);
        }
        
        document.getElementById('online-status').innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> 已同步 ${new Date().toLocaleTimeString()}`;
    }

    // 从 localStorage 加载 (降级方案)
    function loadFromLocalStorage() {
        const allOrders = JSON.parse(localStorage.getItem('caishifu_orders')) || [];
        const activeOrders = allOrders.filter(order => order.status !== 'completed');
        const container = document.getElementById('orders-list');
        
        if (activeOrders.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-gray-400 text-2xl bg-gray-800/30 rounded-3xl">
                📭 暂无待处理订单～
            </div>`;
            return;
        }
        
        container.innerHTML = '';
        activeOrders.reverse().forEach(order => {
            const div = document.createElement('div');
            div.className = 'order-card bg-white text-gray-900 rounded-2xl p-6 shadow-xl';
            div.innerHTML = `
                <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
                    <div>
                        <span class="font-mono text-2xl font-bold text-red-600">${order.orderNum}</span>
                        <span class="ml-3 text-sm text-gray-500">${order.time}</span>
                    </div>
                    <span class="px-3 py-1 rounded-full text-sm font-bold bg-red-100 text-red-700">⏳ 待接单</span>
                </div>
                <div class="bg-gray-50 rounded-xl p-4 mb-5">
                    <div class="font-semibold text-gray-700 mb-2">📋 菜品明细</div>
                    <div class="space-y-1">
                        ${order.items.map(item => `
                            <div class="flex justify-between py-1"><span>${item.name}</span><span class="font-bold">× ${item.qty}</span></div>
                        `).join('')}
                    </div>
                </div>
                <div class="flex justify-between items-center border-t pt-4">
                    <span class="text-xl font-bold">总计：¥ <span class="text-3xl text-red-600">${order.total}</span></span>
                    <button onclick="window.completeLocalOrder('${order.orderNum}')" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl">✅ 接单完成</button>
                </div>
            `;
            container.appendChild(div);
        });
        document.getElementById('online-status').innerHTML = `<span class="w-2 h-2 bg-yellow-500 rounded-full"></span> 离线模式 (本地数据)`;
    }

    // 完成 Firebase 订单
    window.completeOrder = async function(key) {
        if (confirm('确认已完成该订单？')) {
            try {
                const orderRef = ref(db, `orders/${key}`);
                await update(orderRef, {
                    status: "completed",
                    completedTime: serverTimestamp()
                });
                console.log("订单已完成");
            } catch (err) {
                console.error("更新失败:", err);
                alert("更新失败，请重试");
            }
        }
    };

    // 完成本地订单 (降级方案)
    window.completeLocalOrder = function(orderNum) {
        if (confirm(`确认订单 ${orderNum} 已完成？`)) {
            let allOrders = JSON.parse(localStorage.getItem('caishifu_orders')) || [];
            const index = allOrders.findIndex(o => o.orderNum === orderNum);
            if (index !== -1) {
                allOrders[index].status = 'completed';
                localStorage.setItem('caishifu_orders', JSON.stringify(allOrders));
                loadFromLocalStorage();
            }
        }
    };

    // 手动刷新 Firebase
    window.loadFromFirebase = function() {
        onValue(ordersRef, (snapshot) => {
            renderOrders(snapshot.val());
        }, { onlyOnce: true });
    };

    // 实时监听 Firebase 订单
    onValue(ordersRef, (snapshot) => {
        renderOrders(snapshot.val());
    }, (error) => {
        console.error("Firebase监听错误:", error);
        document.getElementById('online-status').innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full"></span> 连接异常，使用本地数据`;
        loadFromLocalStorage();
    });
</script>
</body>
</html>
