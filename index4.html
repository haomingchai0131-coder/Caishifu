<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡师傅 - 厨房后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; }
        .order-card { transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">

<div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold flex items-center gap-3">👨‍🍳 蔡师傅厨房后台</h1>
        <button onclick="loadOrders()" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-2xl font-bold flex items-center gap-2">🔄 手动刷新</button>
    </div>
    <div id="orders-list" class="space-y-6"></div>
</div>

<script>
let orders = [];

function loadOrders() {
    orders = JSON.parse(localStorage.getItem('caishifu_orders')) || [];
    const container = document.getElementById('orders-list');
    container.innerHTML = '';

    if (orders.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-gray-400 text-2xl">暂无新订单～</div>`;
        return;
    }

    orders.forEach((order, index) => {
        const div = document.createElement('div');
        div.className = `order-card bg-white text-gray-900 rounded-3xl p-6 shadow-xl ${order.status === 'completed' ? 'opacity-75' : ''}`;
        div.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="font-mono text-3xl font-bold text-red-600">${order.orderNum}</span>
                    <span class="ml-4 text-sm text-gray-500">${order.time}</span>
                </div>
                <span class="px-4 py-1 rounded-full text-sm font-bold ${order.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                    ${order.status === 'completed' ? '✅ 已完成' : '⏳ 待接单'}
                </span>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                ${order.items.map(item => `<div class="flex justify-between text-lg"><span>${item.name}</span><span class="font-bold">× ${item.qty}</span></div>`).join('')}
            </div>
            <div class="flex justify-between items-center text-2xl font-bold border-t pt-4">
                <span>总计：¥ <span class="text-red-600">${order.total}</span></span>
                ${order.status !== 'completed' ? `<button onclick="completeOrder(${index})" class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl text-xl">✅ 接单完成</button>` : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

function completeOrder(index) {
    orders[index].status = 'completed';
    localStorage.setItem('caishifu_orders', JSON.stringify(orders));
    loadOrders();
}

setInterval(loadOrders, 3000);
loadOrders();
</script>
</body>
</html>
